name: Security

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main, develop ]
  schedule:
    # Run security checks weekly on Monday at 00:00 UTC
    - cron: '0 0 * * 1'
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always

jobs:
  # Security audit for Rust dependencies
  audit:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        run: cargo install cargo-audit

      - name: Run cargo audit
        run: cargo audit --deny warnings

      - name: Upload audit results
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: audit-results
          path: target/audit/

  # Dependency review (only on pull requests)
  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Dependency Review
        uses: actions/dependency-review-action@v4
        with:
          fail-on-severity: moderate

  # Check for outdated dependencies
  outdated:
    name: Outdated Dependencies
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-outdated
        run: cargo install cargo-outdated

      - name: Check for outdated dependencies
        run: cargo outdated --exit-code 1
        continue-on-error: true  # Don't fail the build, just report

  # CodeQL analysis for security vulnerabilities
  codeql:
    name: CodeQL Analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write
      actions: read
      contents: read
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript  # For frontend assets
          queries: +security-and-quality

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3

  # Check for secrets in code
  secrets-scan:
    name: Secrets Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for better detection

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # SAST (Static Application Security Testing)
  sast:
    name: SAST Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Run Semgrep
        uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/security-audit
            p/rust
            p/owasp-top-ten

  # Check for license compliance
  license:
    name: License Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-license
        run: cargo install cargo-license

      - name: Check licenses
        run: |
          cargo license --json > licenses.json
          cat licenses.json

          # Fail if GPL licenses are found (adjust as needed)
          if grep -i "GPL" licenses.json; then
            echo "⚠️  GPL license detected. Review required."
            exit 1
          fi

      - name: Upload license report
        uses: actions/upload-artifact@v4
        with:
          name: licenses
          path: licenses.json

  # NPM audit for frontend dependencies
  npm-audit:
    name: NPM Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run npm audit
        run: npm audit --audit-level=moderate

  # Security summary job
  security-summary:
    name: Security Summary
    runs-on: ubuntu-latest
    needs: [audit, outdated, codeql, secrets-scan, sast, license, npm-audit]
    if: always()
    steps:
      - name: Check results
        run: |
          echo "## Security Scan Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "| Check | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY

          # Audit
          if [[ "${{ needs.audit.result }}" == "success" ]]; then
            echo "| Cargo Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Cargo Audit | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # CodeQL
          if [[ "${{ needs.codeql.result }}" == "success" ]]; then
            echo "| CodeQL | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| CodeQL | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Secrets
          if [[ "${{ needs.secrets-scan.result }}" == "success" ]]; then
            echo "| Secrets Scan | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| Secrets Scan | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # SAST
          if [[ "${{ needs.sast.result }}" == "success" ]]; then
            echo "| SAST | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| SAST | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # License
          if [[ "${{ needs.license.result }}" == "success" ]]; then
            echo "| License Check | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| License Check | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # NPM Audit
          if [[ "${{ needs.npm-audit.result }}" == "success" ]]; then
            echo "| NPM Audit | ✅ Passed |" >> $GITHUB_STEP_SUMMARY
          else
            echo "| NPM Audit | ❌ Failed |" >> $GITHUB_STEP_SUMMARY
          fi

          # Fail if critical checks failed
          if [[ "${{ needs.audit.result }}" == "failure" ]] || \
             [[ "${{ needs.secrets-scan.result }}" == "failure" ]]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "❌ Critical security issues detected!" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
