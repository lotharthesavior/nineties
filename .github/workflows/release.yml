name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., v0.3.0)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  # Create GitHub Release with changelog
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - name: Get version
        id: get_version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION=${GITHUB_REF#refs/tags/}
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Generate changelog
        id: changelog
        run: |
          # Get previous tag
          PREV_TAG=$(git describe --abbrev=0 --tags $(git rev-list --tags --skip=1 --max-count=1) 2>/dev/null || echo "")

          if [ -z "$PREV_TAG" ]; then
            # First release - all commits
            CHANGELOG=$(git log --pretty=format:"- %s (%h)" --no-merges)
          else
            # Changes since last tag
            CHANGELOG=$(git log ${PREV_TAG}..HEAD --pretty=format:"- %s (%h)" --no-merges)
          fi

          # Save to file
          echo "$CHANGELOG" > CHANGELOG.tmp

          # Parse changelog by category
          echo "## 🎉 What's Changed" > RELEASE_NOTES.md
          echo "" >> RELEASE_NOTES.md

          # Features
          if grep -i "feat\|feature" CHANGELOG.tmp > /dev/null; then
            echo "### ✨ Features" >> RELEASE_NOTES.md
            grep -i "feat\|feature" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Fixes
          if grep -i "fix\|bug" CHANGELOG.tmp > /dev/null; then
            echo "### 🐛 Bug Fixes" >> RELEASE_NOTES.md
            grep -i "fix\|bug" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Performance
          if grep -i "perf\|performance" CHANGELOG.tmp > /dev/null; then
            echo "### ⚡ Performance" >> RELEASE_NOTES.md
            grep -i "perf\|performance" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Documentation
          if grep -i "docs\|documentation" CHANGELOG.tmp > /dev/null; then
            echo "### 📚 Documentation" >> RELEASE_NOTES.md
            grep -i "docs\|documentation" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Refactoring
          if grep -i "refactor" CHANGELOG.tmp > /dev/null; then
            echo "### ♻️ Refactoring" >> RELEASE_NOTES.md
            grep -i "refactor" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Tests
          if grep -i "test" CHANGELOG.tmp > /dev/null; then
            echo "### 🧪 Tests" >> RELEASE_NOTES.md
            grep -i "test" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || true
            echo "" >> RELEASE_NOTES.md
          fi

          # Other changes
          echo "### 🔧 Other Changes" >> RELEASE_NOTES.md
          grep -v -i "feat\|feature\|fix\|bug\|perf\|performance\|docs\|documentation\|refactor\|test" CHANGELOG.tmp | sed 's/^/  /' >> RELEASE_NOTES.md || echo "  No other changes" >> RELEASE_NOTES.md

          cat RELEASE_NOTES.md

      - name: Create GitHub Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ steps.get_version.outputs.version }}
          release_name: Release ${{ steps.get_version.outputs.version }}
          body_path: RELEASE_NOTES.md
          draft: false
          prerelease: false

  # Build binaries for multiple platforms
  build-binaries:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    needs: create-release
    strategy:
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            name: arc-linux-x86_64
          - target: x86_64-apple-darwin
            os: macos-latest
            name: arc-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            name: arc-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            name: arc-windows-x86_64.exe
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          target: ${{ matrix.target }}

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }}

      - name: Strip binary (Linux/macOS)
        if: matrix.os != 'windows-latest'
        run: strip target/${{ matrix.target }}/release/arc

      - name: Prepare binary
        run: |
          mkdir -p release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            cp target/${{ matrix.target }}/release/arc.exe release/${{ matrix.name }}
          else
            cp target/${{ matrix.target }}/release/arc release/${{ matrix.name }}
          fi
        shell: bash

      - name: Create archive
        run: |
          cd release
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a ../${{ matrix.name }}.zip ${{ matrix.name }}
          else
            tar czf ../${{ matrix.name }}.tar.gz ${{ matrix.name }}
          fi
        shell: bash

      - name: Upload binary to release
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ./${{ matrix.name }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
          asset_name: ${{ matrix.name }}${{ matrix.os == 'windows-latest' && '.zip' || '.tar.gz' }}
          asset_content_type: application/octet-stream

  # Publish to crates.io (if applicable)
  publish-crate:
    name: Publish to crates.io
    runs-on: ubuntu-latest
    needs: create-release
    if: startsWith(github.ref, 'refs/tags/v')
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Publish to crates.io
        run: cargo publish --token ${{ secrets.CARGO_TOKEN }}
        continue-on-error: true  # Don't fail if already published

  # Build and publish Docker image
  publish-docker:
    name: Publish Docker Image
    runs-on: ubuntu-latest
    needs: create-release
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKER_USERNAME }}/arc
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Publish documentation to GitHub Pages
  publish-docs:
    name: Publish Documentation
    runs-on: ubuntu-latest
    needs: create-release
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Build Rust documentation
        run: cargo doc --no-deps --all-features

      - name: Copy Rust docs to docs folder
        run: |
          mkdir -p docs/api
          cp -r target/doc/* docs/api/

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          cname: arc.dev  # Optional: your custom domain

  # Notify on release completion
  notify:
    name: Notify Release Complete
    runs-on: ubuntu-latest
    needs: [create-release, build-binaries, publish-crate, publish-docker, publish-docs]
    if: always()
    steps:
      - name: Check status
        run: |
          echo "Release pipeline completed!"
          echo "Version: ${{ needs.create-release.outputs.version }}"

          if [[ "${{ needs.build-binaries.result }}" != "success" ]]; then
            echo "⚠️ Binary builds had issues"
          fi

          if [[ "${{ needs.publish-crate.result }}" != "success" ]] && [[ "${{ needs.publish-crate.result }}" != "skipped" ]]; then
            echo "⚠️ Crates.io publish had issues"
          fi

          if [[ "${{ needs.publish-docker.result }}" != "success" ]]; then
            echo "⚠️ Docker publish had issues"
          fi

          if [[ "${{ needs.publish-docs.result }}" != "success" ]]; then
            echo "⚠️ Documentation publish had issues"
          fi
