{% extends "admin/index.html" %}

{% block content %}
<div class="space-y-12">
    <div class="border-b border-gray-900/10 dark:border-gray-700 pb-12">
        <h2 class="text-base/7 font-semibold text-gray-900 dark:text-white">Profile</h2>
        <p class="mt-1 text-sm/6 text-gray-600 dark:text-gray-400">This information will be displayed publicly so be careful what you share.</p>

        <form id="profile-form" action="/admin/profile" method="post" data-controller="profile-form" data-turbo="false" data-action="submit->profile-form#handleSubmit">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                <div class="sm:col-span-4">
                    <label for="name" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Name</label>
                    <div class="mt-2">
                        <input
                            type="text"
                            name="name"
                            id="name"
                            class="block w-full max-w-96 rounded-md bg-white dark:bg-gray-800 px-3 py-1.5 text-base text-gray-900 dark:text-white outline outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:focus:outline-blue-500 sm:text-sm/6 invalid:outline-red-600"
                            placeholder="Jekyll Hyde"
                            value="{{ user_name }}"
                            data-profile-form-target="name"
                            required
                            minlength="3"
                            maxlength="45"
                        >
                    </div>
                </div>

                <div class="sm:col-span-4">
                    <label for="email" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Email</label>
                    <div class="mt-2">
                        <input
                            type="email"
                            name="email"
                            id="email"
                            class="block w-full max-w-96 rounded-md bg-white dark:bg-gray-800 px-3 py-1.5 text-base text-gray-900 dark:text-white outline outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:focus:outline-blue-500 sm:text-sm/6 invalid:outline-red-600"
                            placeholder="you@example.com"
                            value="{{ user_email }}"
                            data-profile-form-target="email"
                            required
                            minlength="3"
                            maxlength="45"
                        >
                    </div>
                </div>
            </div>

            <div class="pt-12 flex gap-2 items-center">
                <button data-profile-form-target="submitButton" type="submit" class="rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 disabled:opacity-50">Save</button>
                <div data-profile-form-target="indicator" class="hidden">
                    {{ components::indicator(label="profile-indicator") }}
                </div>
            </div>
        </form>
    </div>

    <div class="pb-12">
        <h2 class="text-base/7 font-semibold text-gray-900 dark:text-white">Password</h2>

        <form id="password-form" action="/admin/profile-password" method="post" data-controller="password-form" data-turbo="false" data-action="submit->password-form#handleSubmit">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
            <input type="hidden" name="current_email" value="{{ user_email }}">
            <div class="mt-10 grid grid-cols-1 gap-x-6 gap-y-8 sm:grid-cols-6">
                <div class="sm:col-span-4">
                    <label for="old_password" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Old Password</label>
                    <div class="mt-2">
                        <input
                            type="password"
                            name="old_password"
                            id="old_password"
                            class="block w-full max-w-96 rounded-md bg-white dark:bg-gray-800 px-3 py-1.5 text-base text-gray-900 dark:text-white outline outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:focus:outline-blue-500 sm:text-sm/6"
                            data-password-form-target="oldPassword"
                            required
                            minlength="5"
                            maxlength="45"
                        >
                    </div>
                </div>

                <div class="sm:col-span-4">
                    <label for="new_password" class="block text-sm/6 font-medium text-gray-900 dark:text-white">New Password</label>
                    <div class="mt-2">
                        <input
                            type="password"
                            name="new_password"
                            id="new_password"
                            class="block w-full max-w-96 rounded-md bg-white dark:bg-gray-800 px-3 py-1.5 text-base text-gray-900 dark:text-white outline outline-1 -outline-offset-1 outline-gray-300 dark:outline-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:outline focus:outline-2 focus:-outline-offset-2 focus:outline-blue-600 dark:focus:outline-blue-500 sm:text-sm/6"
                            data-password-form-target="newPassword"
                            required
                            minlength="5"
                            maxlength="45"
                        >
                    </div>
                </div>
            </div>

            <div class="pt-12 flex gap-2 items-center">
                <button data-password-form-target="submitButton" type="submit" class="rounded-md bg-blue-600 px-3 py-2 text-sm font-semibold text-white shadow-sm hover:bg-blue-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-blue-600 disabled:opacity-50">Save</button>
                <div data-password-form-target="indicator" class="hidden">
                    {{ components::indicator(label="password-indicator") }}
                </div>
            </div>
        </form>
    </div>
</div>
{% endblock %}
