    <meta name="theme-color" content="#ffffff">
    <link rel="icon" href="/public/imgs/arc-logo.png" sizes="any">
    <link rel="icon" href="/public/imgs/arc-logo.png" type="image/png">
    <link rel="apple-touch-icon" href="/public/imgs/arc-logo.png">

    <!-- Turbo configuration -->
    <meta name="turbo-cache-control" content="no-preview">

    <!-- Dark mode initialization (prevents flash) -->
    <script>
        (function() {
            const stored = localStorage.getItem('theme');
            if (stored === 'dark' || (!stored && window.matchMedia('(prefers-color-scheme: dark)').matches)) {
                document.documentElement.classList.add('dark');
            }
        })();
    </script>
