
<div class="flex min-h-screen bg-white dark:bg-gray-900">
    <div class="flex flex-1 flex-col justify-center px-4 py-12">
        <div class="mx-auto w-full max-w-sm lg:w-96">
            <div class="w-full text-center">
                <a href="/">
                    <img class="h-10 w-auto mx-auto" src="/public/imgs/arc-logo.png" alt="Your Company">
                </a>
                <h2 class="mt-8 text-2xl/9 font-bold tracking-tight text-gray-900 dark:text-white">Sign in to your account</h2>
            </div>

            <div class="mt-10">
                {% if session_message | length > 0 %}
                    <div class="mb-4 font-medium text-red-500 dark:text-red-400">{{ session_message }}</div>
                {% endif %}
                <div>
                    <form action="/signin" method="POST" class="space-y-6" data-turbo="false">
                        <input type="hidden" name="csrf_token" value="{{ csrf_token }}">
                        <div>
                            <label for="email" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Email address</label>
                            <div class="mt-2">
                                <input id="email" name="email" type="email" autocomplete="email" required class="block w-full rounded-md border-0 py-1.5 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-600 dark:focus:ring-indigo-500 sm:text-sm/6 bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
                            </div>
                        </div>

                        <div>
                            <label for="password" class="block text-sm/6 font-medium text-gray-900 dark:text-white">Password</label>
                            <div class="mt-2">
                                <input id="password" name="password" type="password" autocomplete="current-password" required class="block w-full rounded-md border-0 py-1.5 shadow-sm ring-1 ring-inset ring-gray-300 dark:ring-gray-600 placeholder:text-gray-400 dark:placeholder:text-gray-500 focus:ring-2 focus:ring-inset focus:ring-indigo-600 dark:focus:ring-indigo-500 sm:text-sm/6 bg-white dark:bg-gray-800 text-gray-900 dark:text-white">
                            </div>
                        </div>

                        <div class="flex items-center justify-between">
                            <div class="flex items-center">
                                <input id="remember-me" name="remember-me" type="checkbox" class="h-4 w-4 rounded border-gray-300 dark:border-gray-600 text-indigo-600 focus:ring-indigo-600 dark:bg-gray-800">
                                <label for="remember-me" class="ml-3 block text-sm/6 text-gray-700 dark:text-gray-300">Remember me</label>
                            </div>

                            <div class="text-sm/6">
                                <a href="#" class="font-semibold text-indigo-600 dark:text-indigo-400 hover:text-indigo-500 dark:hover:text-indigo-300">Forgot password?</a>
                            </div>
                        </div>

                        <div>
                            <button
                                type="submit"
                                class="flex w-full justify-center rounded-md bg-indigo-600 px-3 py-1.5 text-sm/6 font-semibold text-white shadow-sm hover:bg-indigo-500 focus-visible:outline focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-indigo-600"
                            >Sign in</button>
                        </div>
                    </form>
                </div>

                <div class="mt-10 flex justify-center">
                    <!-- Dark mode toggle -->
                    <button data-action="click->dark-mode#toggle" type="button" class="rounded-md p-2 text-gray-500 dark:text-gray-400 hover:bg-gray-100 dark:hover:bg-gray-800">
                        <span class="sr-only">Toggle dark mode</span>
                        <!-- Sun icon (shown in dark mode) -->
                        <svg data-dark-mode-target="sunIcon" class="h-5 w-5 hidden" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m6.364.386-1.591 1.591M21 12h-2.25m-.386 6.364-1.591-1.591M12 18.75V21m-4.773-4.227-1.591 1.591M5.25 12H3m4.227-4.773L5.636 5.636M15.75 12a3.75 3.75 0 1 1-7.5 0 3.75 3.75 0 0 1 7.5 0Z" />
                        </svg>
                        <!-- Moon icon (shown in light mode) -->
                        <svg data-dark-mode-target="moonIcon" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
                        </svg>
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>
